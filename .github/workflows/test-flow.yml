name: PR Incremental Test Flow

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    name: Analyze affected packages & coverage gaps
    runs-on: ubuntu-latest
    outputs:
      affected_packages: ${{ steps.turbo.outputs.affected_packages }}
      has_coverage_gaps: ${{ steps.gaps.outputs.has_coverage_gaps }}
      gap_files: ${{ steps.gaps.outputs.gap_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Turbo affected analysis
        id: turbo
        run: |
          AFFECTED=$(bunx turbo run test --filter='...[origin/main...HEAD]' --dry-run=json 2>/dev/null || echo '{"packages":[]}')
          PACKAGES=$(echo "$AFFECTED" | jq -c '.packages // []')
          echo "affected_packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Coverage gap detection
        id: gaps
        run: |
          bun run scripts/coverage-gap-detector.ts \
            --base origin/main \
            --head HEAD \
            --threshold 80 \
            --output gaps.json

          if [ -f gaps.json ]; then
            GAP_COUNT=$(jq '.gaps | length' gaps.json)
            if [ "$GAP_COUNT" -gt 0 ]; then
              echo "has_coverage_gaps=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_coverage_gaps=false" >> "$GITHUB_OUTPUT"
            fi
            echo "gap_files=$(jq -c '.' gaps.json)" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage_gaps=false" >> "$GITHUB_OUTPUT"
            echo 'gap_files={"gaps":[]}' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-gaps
          path: gaps.json
          retention-days: 7

  suggest:
    name: AI test suggestions
    needs: analyze
    if: needs.analyze.outputs.has_coverage_gaps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate AI test suggestions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bun run scripts/ai-test-suggest.ts \
            --gaps '${{ needs.analyze.outputs.gap_files }}' \
            --output suggestions.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const suggestions = fs.readFileSync('suggestions.md', 'utf8');
            const body = `## 🤖 AI Test Suggestions\n\n${suggestions}\n\n> 审核后回复 \`/approve-tests\` 自动提交`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('AI Test Suggestions')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  selective-test:
    name: Run affected tests
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run affected tests
        run: |
          bunx turbo run test \
            --filter='...[origin/main...HEAD]' \
            --concurrency=4 \
            2>&1 | tee test-output.log
        continue-on-error: true

      - name: Post coverage report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let coverageSummary = 'No coverage report generated.';
            const coveragePath = 'coverage/coverage-summary.json';
            if (fs.existsSync(coveragePath)) {
              const coverage = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
              const total = coverage.total || {};
              const lines = total.lines?.pct ?? 'N/A';
              const branches = total.branches?.pct ?? 'N/A';
              const functions = total.functions?.pct ?? 'N/A';
              const statements = total.statements?.pct ?? 'N/A';
              coverageSummary = `| Metric | Coverage |
            |--------|----------|
            | Lines | ${lines}% |
            | Branches | ${branches}% |
            | Functions | ${functions}% |
            | Statements | ${statements}% |`;
            }

            let testLog = '';
            if (fs.existsSync('test-output.log')) {
              const log = fs.readFileSync('test-output.log', 'utf8');
              const lines = log.split('\n');
              testLog = lines.slice(-30).join('\n');
            }

            const body = `## 📊 Test Results\n\n### Coverage\n${coverageSummary}\n\n<details>\n<summary>Test output (last 30 lines)</summary>\n\n\`\`\`\n${testLog}\n\`\`\`\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-output.log
            coverage/
            playwright-report/
          retention-days: 14
